<!DOCTYPE html>
<html>
<head>
    <title>My Account</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #FFFBF7 0%, #FFF5E6 100%);
            min-height: 100vh;
        }

        .profile-box {
            background: white;
            padding: 30px;
            max-width: 600px;
            margin: 20px auto;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #FFD9B3;
            box-shadow: 0 8px 24px rgba(255, 179, 102, 0.15);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #FFB366;
            margin-bottom: 15px;
        }

        h2 {
            color: #332211;
            font-size: 24px;
            margin: 10px 0;
        }

        p {
            color: #77553A;
            margin: 10px 0;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 25px 0;
            gap: 20px;
        }

        .stat-item {
            flex: 1;
            padding: 15px;
            background: #FFF5E6;
            border-radius: 10px;
            border: 2px solid #FFE6CC;
        }

        .stat-item strong {
            font-size: 20px;
            color: #FFB366;
            display: block;
        }

        .stat-item span {
            color: #77553A;
            font-size: 14px;
            display: block;
            margin-top: 5px;
        }

        .feed {
            max-width: 600px;
            margin: 30px auto;
        }

        .post-card {
            background: white;
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #FFD9B3;
            box-shadow: 0 4px 12px rgba(255, 179, 102, 0.1);
            transition: transform 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-2px);
        }

        .post-card img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .post-card p {
            margin: 10px 0;
            color: #332211;
        }

        .btn {
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            margin: 5px;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-add {
            background: linear-gradient(135deg, #FFB366 0%, #FF9933 100%);
            box-shadow: 0 4px 12px rgba(255, 179, 102, 0.3);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 179, 102, 0.4);
        }

        .btn-edit {
            background: linear-gradient(135deg, #FFB366 0%, #FF9933 100%);
            box-shadow: 0 2px 8px rgba(255, 179, 102, 0.2);
        }

        .btn-edit:hover {
            box-shadow: 0 4px 12px rgba(255, 179, 102, 0.3);
        }

        .btn-delete {
            background: linear-gradient(135deg, #FF6B6B 0%, #EE5A52 100%);
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.2);
        }

        .btn-delete:hover {
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
        }

        .btn-profile {
            background: linear-gradient(135deg, #7CB9E8 0%, #5A9FD4 100%);
            box-shadow: 0 2px 8px rgba(124, 185, 232, 0.2);
        }

        .btn-profile:hover {
            box-shadow: 0 4px 12px rgba(124, 185, 232, 0.3);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .profile-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

<div class="profile-box">
    <img src="{{ profile.profile_pic.url }}" class="profile-pic" alt="Profile">

    <h2>{{ request.user.username }}</h2>

    <p>{{ profile.bio }}</p>

    <div class="stats">
        <div class="stat-item">
            <strong>{{ posts|length }}</strong>
            <span>Posts</span>
        </div>
        <div class="stat-item">
            <strong>{{ followers_count }}</strong>
            <span>Followers</span>
        </div>
        <div class="stat-item">
            <strong>{{ following_count }}</strong>
            <span>Following</span>
        </div>
    </div>

    <div class="profile-actions">
        <a href="{% url 'create_post' %}" class="btn btn-add">➕ Add Post</a>
        <a href="{% url 'edit_profile' %}" class="btn btn-profile">✏️ Edit Profile</a>
    </div>
</div>

<div class="feed">
{% for post in posts %}
    <div class="post-card">

        {% if post.image %}
            <img src="{{ post.image.url }}" alt="Post image">
        {% endif %}

        <p><strong>{{ post.caption }}</strong></p>

        <div class="action-buttons">
            <a href="{% url 'edit_post' post.id %}" class="btn btn-edit">✏️ Edit</a>
            <a href="{% url 'delete_post' post.id %}" 
               class="btn btn-delete"
               onclick="return confirm('Delete this post?')">
               🗑️ Delete
            </a>
        </div>
    </div>
{% endfor %}
</div>

</body>
</html>
