<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #FFFBF7 0%, #FFF5E6 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 8px 24px rgba(255, 179, 102, 0.15);
            max-width: 400px; 
            width: 100%; 
            border: 2px solid #FFD9B3;
        }
        h1 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: #332211; 
            font-size: 28px;
        }
        form { display: flex; flex-direction: column; }
        input { 
            padding: 12px; 
            margin: 10px 0; 
            border: 2px solid #FFD9B3; 
            border-radius: 8px; 
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #FFB366;
            box-shadow: 0 0 0 3px rgba(255, 179, 102, 0.1);
        }
        button { 
            background: linear-gradient(135deg, #FFB366 0%, #FF9933 100%); 
            color: white; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 15px; 
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 179, 102, 0.3);
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 179, 102, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .error { 
            color: #EE5A52; 
            padding: 10px; 
            margin-bottom: 15px; 
            background: #FFF5E6; 
            border-radius: 8px;
            border-left: 4px solid #FF6B6B;
        }
        a {
            color: #FFB366;
            text-decoration: none;
            text-align: center;
            margin-top: 15px;
            transition: color 0.3s ease;
        }
        a:hover {
            color: #FF9933;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>🔐 Login</h1>

    <form method="POST">
        {% csrf_token %}
        {% if form.non_field_errors %}
            <div class="error">{{ form.non_field_errors.0 }}</div>
        {% endif %}
        {{ form.as_p }}
        <button type="submit">🚀 Login</button>
        <a href="{% url 'register' %}">Don't have an account? Create one</a>
    </form>
</div>

</body>
</html>
