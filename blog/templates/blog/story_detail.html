<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story - {{ story.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background: #FFFBF7; color: #332211; font-family: 'DM Sans', sans-serif; margin:0; padding:0; }
        .wrapper { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .card { width:min(720px, 100%); background:#fff; border-radius:18px; border:1px solid #ffd9b3; box-shadow:0 10px 40px rgba(0,0,0,.08); overflow:hidden; }
        .header { padding:14px 16px; display:flex; justify-content:space-between; align-items:center; background:#fffaf2; border-bottom:1px solid #ffd9b3; }
        .back-btn, .nav-btn { text-decoration:none; color:#7cb9e8; font-weight:700; }
        .story-content { position: relative; display:flex; justify-content:center; align-items:center; background:#fdf6ee; min-height:420px; }
        .story-content img, .story-content video { width:100%; max-height:600px; object-fit:contain; }
        .story-meta { padding:14px 16px; }
        .story-meta h1 { margin:0 0 6px; font-size:1.2rem; color:#332211; }
        .story-meta p { margin:0; color:#6f563f; }
        .author { font-size:13px; color:#7b5d49; }
        .no-media { margin:40px; color:#a27950; font-size:1rem; }
        @media (max-width:768px) { .card { width: 100%; } .story-content { min-height:260px; } }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <div class="header">
            <a href="{% url 'feed' %}" class="back-btn">← Back to Feed</a>
            <span class="author">{{ story.author.username }} • {{ story.created_at|date:'M d, Y H:i' }}</span>
            <a href="{% url 'user_profile' story.author.id %}" class="nav-btn">Profile</a>
        </div>
        <div class="story-content">
            {% if story.image %}
                <img src="{{ story.image.url }}" alt="{{ story.title }}" loading="lazy">
            {% elif story.video %}
                <video controls>
                    <source src="{{ story.video.url }}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            {% else %}
                <div class="no-media">No media found for this story.</div>
            {% endif %}
        </div>
        <div class="story-meta">
            <h1>{{ story.title }}</h1>
            <p>{{ story.author.profile.bio|default:'No profile info yet.' }}</p>
        </div>
    </div>
</div>
</body>
</html>
