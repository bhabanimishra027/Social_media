<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Reel</title>
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #FFFBF7; color: #332211; }
        .box { max-width: 500px; margin: 60px auto; background:#fff; border:1px solid #FFD9B3; border-radius:16px; padding:22px; box-shadow:0 8px 22px rgba(255,153,51,.15); }
        h1 { font-size:22px; margin-bottom:14px; }
        input, textarea { width:100%; padding:10px; border-radius:10px; border:1px solid #FFE6CC; margin-bottom:12px; }
        button { border:none; background:linear-gradient(135deg,#7CB9E8,#5A9FD4); color:white; padding:10px 16px; border-radius:10px; font-weight:700; cursor:pointer; }
    </style>
</head>
<body>
<div class="box">
    <h1>Create New Reel</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Post Reel</button>
    </form>
    <p style="margin-top:12px;"><a href="{% url 'reels' %}">← Back to Reels</a></p>
</div>
</body>
</html>
